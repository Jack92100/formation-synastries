<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 4 - Lire le climat général</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --card: #1a1816;
  --card-border: #2a2622;
  --text: #e8e4df;
  --muted: #6b6560;
  --accent: #d4a574;
  --pink: #e8b4b8;
  --gold: #c9b896;
  --blue: #7ba0b8;
  --sage: #8aaa8a;
  --red: #c87070;
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 3rem 1.5rem 2rem;
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.module-label {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.75rem;
}

header h1 {
  font-family: 'Cormorant', serif;
  font-size: clamp(1.75rem, 5vw, 2.5rem);
  font-weight: 400;
  color: var(--text);
  line-height: 1.2;
}

header p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-top: 0.75rem;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
}

.progress-bar {
  max-width: 780px;
  margin: 2rem auto 0;
  padding: 0 1.5rem;
}

.progress-track {
  height: 3px;
  background: var(--card-border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

.progress-text {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 0.5rem;
  text-align: right;
}

main {
  max-width: 780px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.exercise-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 2rem;
  margin-bottom: 1.5rem;
  transition: border-color 0.3s;
}

.exercise-card:hover {
  border-color: #3a3530;
}

.card-number {
  font-family: 'Cormorant', serif;
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.card-number .num {
  color: var(--accent);
  font-weight: 600;
}

.profiles-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.profile-col {
  background: rgba(15, 15, 15, 0.6);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 1.25rem;
}

.profile-name {
  font-family: 'Cormorant', serif;
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.profile-name .badge {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  background: rgba(212, 165, 116, 0.12);
  color: var(--accent);
}

.profile-name.name-a { color: var(--pink); }
.profile-name.name-b { color: var(--blue); }

.planet-row {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  font-size: 0.88rem;
  line-height: 1.5;
}

.planet-row:last-child {
  margin-bottom: 0;
}

.planet-label {
  font-weight: 500;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  min-width: 52px;
  flex-shrink: 0;
}

.planet-label.asc { color: var(--accent); }
.planet-label.sun { color: var(--gold); }
.planet-label.moon { color: var(--sage); }

.planet-sign {
  font-weight: 500;
  color: var(--text);
}

.planet-desc {
  color: var(--muted);
  font-size: 0.82rem;
  font-style: italic;
}

.vs-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  grid-column: 1 / -1;
  margin: -0.25rem 0;
}

.vs-text {
  font-family: 'Cormorant', serif;
  font-size: 0.85rem;
  font-style: italic;
  color: var(--muted);
  opacity: 0.5;
}

.field-group {
  margin-bottom: 0;
}

label {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

label .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.dot-climat { background: var(--accent); }

textarea {
  width: 100%;
  min-height: 90px;
  background: var(--bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.95rem;
  padding: 0.85rem 1rem;
  resize: vertical;
  transition: border-color 0.3s;
  line-height: 1.6;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

textarea::placeholder {
  color: var(--muted);
  opacity: 0.5;
}

.btn-row {
  display: flex;
  gap: 0.75rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}

.btn {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.6rem 1.25rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.02em;
}

.btn-reveal {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
}

.btn-reveal:hover {
  background: rgba(212, 165, 116, 0.1);
}

.btn-reveal.revealed {
  border-color: var(--muted);
  color: var(--muted);
}

.model-answer {
  margin-top: 1.25rem;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.6s ease, opacity 0.4s ease;
  opacity: 0;
}

.model-answer.visible {
  max-height: 400px;
  opacity: 1;
}

.answer-divider {
  height: 1px;
  background: var(--card-border);
  margin-bottom: 1rem;
}

.answer-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 500;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  color: var(--gold);
}

.answer-text {
  font-family: 'Cormorant', serif;
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--text);
  padding: 0.85rem 1.1rem;
  background: rgba(201, 184, 150, 0.05);
  border-radius: 8px;
  border-left: 2px solid var(--gold);
}

.actions {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 2rem;
  flex-wrap: wrap;
}

.btn-save {
  background: var(--accent);
  color: var(--bg);
  font-weight: 600;
}

.btn-save:hover {
  filter: brightness(1.1);
}

.btn-clear {
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--muted);
}

.btn-clear:hover {
  border-color: var(--muted);
  color: var(--text);
}

.save-indicator {
  text-align: center;
  font-size: 0.75rem;
  color: var(--sage);
  opacity: 0;
  transition: opacity 0.3s;
  margin-top: 0.5rem;
}

.save-indicator.show {
  opacity: 1;
}

footer {
  text-align: center;
  padding: 2rem 1.5rem;
  border-top: 1px solid var(--card-border);
  max-width: 780px;
  margin: 0 auto;
}

footer p {
  font-family: 'Cormorant', serif;
  font-size: 0.9rem;
  color: var(--muted);
  font-style: italic;
}

@media (max-width: 560px) {
  .profiles-grid {
    grid-template-columns: 1fr;
  }
  .exercise-card { padding: 1.25rem; }
  .profile-col { padding: 1rem; }
  textarea { min-height: 70px; font-size: 0.9rem; }
  .btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
  .vs-divider { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="module-label">Module 4</div>
  <h1>Lire le climat général</h1>
  <p>Comparez les profils et rédigez une phrase de climat relationnel. Puis révélez la réponse modèle.</p>
</header>

<div class="progress-bar">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">0 / 3 phrases rédigées</div>
</div>

<main id="exercises"></main>

<div class="actions">
  <button class="btn btn-save" onclick="saveAll()">Sauvegarder</button>
  <button class="btn btn-clear" onclick="clearAll()">Effacer tout</button>
</div>
<div class="save-indicator" id="saveIndicator">Sauvegarde réussie</div>

<footer>
  <p>Module 4 - Atelier pratique de synastrie</p>
</footer>

<script>
const SCENARIOS = [
  {
    id: 1,
    title: "Carine et Carl",
    profileA: {
      name: "Carine",
      asc: { sign: "Gémeaux", desc: "contact facile, curiosité" },
      sun: { sign: "Vierge", desc: "rigueur, service" },
      moon: { sign: "Taureau", desc: "stabilité, confort" }
    },
    profileB: {
      name: "Carl",
      asc: { sign: "Capricorne", desc: "sérieux, réserve" },
      sun: { sign: "Capricorne", desc: "ambition, structure" },
      moon: { sign: "Vierge", desc: "précision, inquiétude" }
    },
    model: "Un climat terre/mutation : sobriété, exigence, sérieux. Compatibilité dans le besoin de structure et de fiabilité. Le risque : trop de raison, pas assez d'étincelle."
  },
  {
    id: 2,
    title: "Carine et Valentin",
    profileA: {
      name: "Carine",
      asc: { sign: "Gémeaux", desc: "contact facile, curiosité" },
      sun: { sign: "Vierge", desc: "rigueur, service" },
      moon: { sign: "Taureau", desc: "stabilité, confort" }
    },
    profileB: {
      name: "Valentin",
      asc: { sign: "Sagittaire", desc: "enthousiasme, horizon" },
      sun: { sign: "Poissons", desc: "idéalisme, fusion" },
      moon: { sign: "Scorpion", desc: "intensité, profondeur" }
    },
    model: "Un climat de fascination mutuelle : le dialogue (Gémeaux/Sagittaire) rencontre la profondeur (Vierge/Poissons). Attraction puissante (Soleil/Lune croisés), mais risque de noyade émotionnelle."
  },
  {
    id: 3,
    title: "Carine et Gilles",
    profileA: {
      name: "Carine",
      asc: { sign: "Gémeaux", desc: "contact facile, curiosité" },
      sun: { sign: "Vierge", desc: "rigueur, service" },
      moon: { sign: "Taureau", desc: "stabilité, confort" }
    },
    profileB: {
      name: "Gilles",
      asc: { sign: "Balance", desc: "élégance, harmonie" },
      sun: { sign: "Scorpion", desc: "profondeur, transformation" },
      moon: { sign: "Cancer", desc: "nurturing, mémoire" }
    },
    model: "Un climat apaisé : la communication (Gémeaux/Balance) facilite le quotidien. L'émotionnel (Taureau/Cancer) se reconnaît. Une relation qui respire, sans drame mais avec profondeur."
  }
];

const STORAGE_KEY = 'synastrie-module4';
const TOTAL_FIELDS = SCENARIOS.length;

function buildProfileHTML(p, cls) {
  return `
  <div class="profile-col">
    <div class="profile-name ${cls}">
      ${p.name}
      <span class="badge">${cls === 'name-a' ? 'Profil A' : 'Profil B'}</span>
    </div>
    <div class="planet-row">
      <span class="planet-label asc">Asc</span>
      <span class="planet-sign">${p.asc.sign}</span>
      <span class="planet-desc">${p.asc.desc}</span>
    </div>
    <div class="planet-row">
      <span class="planet-label sun">Soleil</span>
      <span class="planet-sign">${p.sun.sign}</span>
      <span class="planet-desc">${p.sun.desc}</span>
    </div>
    <div class="planet-row">
      <span class="planet-label moon">Lune</span>
      <span class="planet-sign">${p.moon.sign}</span>
      <span class="planet-desc">${p.moon.desc}</span>
    </div>
  </div>`;
}

function buildScenarioHTML(sc, i) {
  return `
  <div class="exercise-card" id="card-${sc.id}">
    <div class="card-number">Comparaison <span class="num">${i + 1}</span> / 3 &mdash; ${sc.title}</div>

    <div class="profiles-grid">
      ${buildProfileHTML(sc.profileA, 'name-a')}
      ${buildProfileHTML(sc.profileB, 'name-b')}
      <div class="vs-divider"><span class="vs-text">vs</span></div>
    </div>

    <div class="field-group">
      <label for="climat-${sc.id}"><span class="dot dot-climat"></span> Votre phrase de climat relationnel</label>
      <textarea
        id="climat-${sc.id}"
        placeholder="Rédigez une phrase qui résume le climat entre ces deux profils..."
        oninput="onInput()"
      ></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-reveal" id="reveal-${sc.id}" onclick="toggleReveal(${sc.id})">
        Voir la réponse modèle
      </button>
    </div>

    <div class="model-answer" id="model-${sc.id}">
      <div class="answer-divider"></div>
      <div class="answer-label"><span class="dot dot-climat"></span> Réponse modèle</div>
      <div class="answer-text">${sc.model}</div>
    </div>
  </div>`;
}

function render() {
  const container = document.getElementById('exercises');
  const saved = loadSaved();

  container.innerHTML = SCENARIOS.map((sc, i) => buildScenarioHTML(sc, i)).join('');

  SCENARIOS.forEach(sc => {
    const key = 'climat-' + sc.id;
    const el = document.getElementById(key);
    if (el && saved.answers[key]) el.value = saved.answers[key];
  });

  if (saved.revealed) {
    saved.revealed.forEach(id => {
      const el = document.getElementById('model-' + id);
      const btn = document.getElementById('reveal-' + id);
      if (el) el.classList.add('visible');
      if (btn) { btn.textContent = 'Masquer la réponse modèle'; btn.classList.add('revealed'); }
    });
  }

  updateProgress();
}

function onInput() {
  autoSave();
  updateProgress();
}

function toggleReveal(id) {
  const el = document.getElementById('model-' + id);
  const btn = document.getElementById('reveal-' + id);
  const isVisible = el.classList.contains('visible');

  if (isVisible) {
    el.classList.remove('visible');
    btn.textContent = 'Voir la réponse modèle';
    btn.classList.remove('revealed');
  } else {
    el.classList.add('visible');
    btn.textContent = 'Masquer la réponse modèle';
    btn.classList.add('revealed');
  }

  autoSave();
}

function updateProgress() {
  let count = 0;
  SCENARIOS.forEach(sc => {
    const val = document.getElementById('climat-' + sc.id)?.value?.trim();
    if (val && val.length > 5) count++;
  });
  const pct = (count / TOTAL_FIELDS) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = count + ' / ' + TOTAL_FIELDS + ' phrases rédigées';
}

function getAnswers() {
  const answers = {};
  SCENARIOS.forEach(sc => {
    answers['climat-' + sc.id] = document.getElementById('climat-' + sc.id)?.value || '';
  });
  return answers;
}

function getRevealed() {
  const revealed = [];
  SCENARIOS.forEach(sc => {
    if (document.getElementById('model-' + sc.id)?.classList.contains('visible')) {
      revealed.push(sc.id);
    }
  });
  return revealed;
}

function autoSave() {
  const data = { answers: getAnswers(), revealed: getRevealed() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function saveAll() {
  autoSave();
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2000);
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { answers: {}, revealed: [] };
}

function clearAll() {
  if (!confirm('Effacer toutes vos réponses ?')) return;
  localStorage.removeItem(STORAGE_KEY);
  render();
}

render();
</script>
</body>
</html>
