<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 2 - Poser le cadre de la relation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --card: #1a1816;
  --card-border: #2a2622;
  --text: #e8e4df;
  --muted: #6b6560;
  --accent: #d4a574;
  --pink: #e8b4b8;
  --gold: #c9b896;
  --blue: #7ba0b8;
  --sage: #8aaa8a;
  --red: #c87070;
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 3rem 1.5rem 2rem;
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.module-label {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.75rem;
}

header h1 {
  font-family: 'Cormorant', serif;
  font-size: clamp(1.75rem, 5vw, 2.5rem);
  font-weight: 400;
  color: var(--text);
  line-height: 1.2;
}

header p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-top: 0.75rem;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
}

.progress-bar {
  max-width: 700px;
  margin: 2rem auto 0;
  padding: 0 1.5rem;
}

.progress-track {
  height: 3px;
  background: var(--card-border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

.progress-text {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 0.5rem;
  text-align: right;
}

main {
  max-width: 700px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.exercise-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 2rem;
  margin-bottom: 1.5rem;
  transition: border-color 0.3s;
}

.exercise-card:hover {
  border-color: #3a3530;
}

.card-number {
  font-family: 'Cormorant', serif;
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.card-number .num {
  color: var(--accent);
  font-weight: 600;
}

.situation-text {
  font-family: 'Cormorant', serif;
  font-size: clamp(1.05rem, 2.5vw, 1.2rem);
  font-weight: 400;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 1.5rem;
  padding: 1rem 1.25rem;
  background: rgba(212, 165, 116, 0.04);
  border-radius: 8px;
  border-left: 2px solid var(--accent);
}

.situation-text .quote {
  display: block;
  color: var(--pink);
  font-style: italic;
  margin-top: 0.75rem;
  padding-left: 0.75rem;
  border-left: 1px solid var(--card-border);
}

.field-group {
  margin-bottom: 1.25rem;
}

.field-group:last-of-type {
  margin-bottom: 0;
}

label {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

label .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.dot-nature { background: var(--pink); }
.dot-question { background: var(--blue); }
.dot-contexte { background: var(--sage); }

textarea {
  width: 100%;
  min-height: 80px;
  background: var(--bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.95rem;
  padding: 0.85rem 1rem;
  resize: vertical;
  transition: border-color 0.3s;
  line-height: 1.6;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

textarea::placeholder {
  color: var(--muted);
  opacity: 0.5;
}

.btn-row {
  display: flex;
  gap: 0.75rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}

.btn {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.6rem 1.25rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.02em;
}

.btn-reveal {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
}

.btn-reveal:hover {
  background: rgba(212, 165, 116, 0.1);
}

.btn-reveal.revealed {
  border-color: var(--muted);
  color: var(--muted);
}

.model-answer {
  margin-top: 1.25rem;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.6s ease, opacity 0.4s ease;
  opacity: 0;
}

.model-answer.visible {
  max-height: 600px;
  opacity: 1;
}

.answer-block {
  margin-bottom: 0.75rem;
}

.answer-block:last-child {
  margin-bottom: 0;
}

.answer-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 500;
  margin-bottom: 0.35rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.answer-label.label-nature { color: var(--pink); }
.answer-label.label-question { color: var(--blue); }
.answer-label.label-contexte { color: var(--sage); }

.answer-text {
  font-family: 'Cormorant', serif;
  font-size: 1rem;
  line-height: 1.65;
  color: var(--text);
  padding: 0.75rem 1rem;
  background: rgba(201, 184, 150, 0.05);
  border-radius: 8px;
  border-left: 2px solid var(--gold);
}

.answer-block-nature .answer-text { border-left-color: var(--pink); background: rgba(232, 180, 184, 0.04); }
.answer-block-question .answer-text { border-left-color: var(--blue); background: rgba(123, 160, 184, 0.04); }
.answer-block-contexte .answer-text { border-left-color: var(--sage); background: rgba(138, 170, 138, 0.04); }

.answer-divider {
  height: 1px;
  background: var(--card-border);
  margin: 1rem 0 1rem;
}

.actions {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  margin-top: 2rem;
  flex-wrap: wrap;
}

.btn-save {
  background: var(--accent);
  color: var(--bg);
  font-weight: 600;
}

.btn-save:hover {
  filter: brightness(1.1);
}

.btn-clear {
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--muted);
}

.btn-clear:hover {
  border-color: var(--muted);
  color: var(--text);
}

.save-indicator {
  text-align: center;
  font-size: 0.75rem;
  color: var(--sage);
  opacity: 0;
  transition: opacity 0.3s;
  margin-top: 0.5rem;
}

.save-indicator.show {
  opacity: 1;
}

footer {
  text-align: center;
  padding: 2rem 1.5rem;
  border-top: 1px solid var(--card-border);
  max-width: 700px;
  margin: 0 auto;
}

footer p {
  font-family: 'Cormorant', serif;
  font-size: 0.9rem;
  color: var(--muted);
  font-style: italic;
}

@media (max-width: 480px) {
  .exercise-card { padding: 1.25rem; }
  textarea { min-height: 65px; font-size: 0.9rem; }
  .btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
  .situation-text { padding: 0.85rem 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="module-label">Module 2</div>
  <h1>Poser le cadre de la relation</h1>
  <p>Pour chaque situation, identifiez la nature du lien, reformulez la vraie question et notez le contexte indispensable.</p>
</header>

<div class="progress-bar">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">0 / 9 champs remplis</div>
</div>

<main id="exercises"></main>

<div class="actions">
  <button class="btn btn-save" onclick="saveAll()">Sauvegarder</button>
  <button class="btn btn-clear" onclick="clearAll()">Effacer tout</button>
</div>
<div class="save-indicator" id="saveIndicator">Sauvegarde reussie</div>

<footer>
  <p>Module 2 - Atelier pratique de synastrie</p>
</footer>

<script>
const SITUATIONS = [
  {
    id: 1,
    text: "Sophie, 35 ans, consulte pour sa relation avec Marc, 38 ans. Ils vivent ensemble depuis 2 ans.",
    quote: "Il ne m'ecoute plus, je me sens invisible.",
    extra: "Derniere grande dispute il y a 3 semaines.",
    answers: {
      nature: "Couple amoureux, cohabitation",
      question: "Pourquoi la communication s'est-elle degradee ? Est-ce un probleme de langage (Mercure) ou de reconnaissance affective (Venus/Lune) ?",
      contexte: "35 ans, cohabitation 2 ans, phase de construction, derniere dispute recente"
    }
  },
  {
    id: 2,
    text: "Thomas, 28 ans, veut savoir s'il doit accepter un poste a l'etranger. Sa compagne Lea, 26 ans, ne veut pas partir.",
    quote: "Est-ce que notre couple peut survivre a la distance ?",
    extra: "",
    answers: {
      nature: "Couple amoureux, decision de vie, enjeu de separation potentielle",
      question: "La synastrie indique-t-elle une souplesse face a la distance (Uranus, Sagittaire) ou un besoin de proximite (Lune, Cancer) ? Que dit la dynamique sur la capacite d'adaptation ?",
      contexte: "28/26 ans, enjeu professionnel vs affectif, relation pas encore installee dans la duree"
    }
  },
  {
    id: 3,
    text: "Claire, 50 ans, separee depuis 6 mois, revoit son ex-mari pour les enfants.",
    quote: "A chaque fois qu'on se voit, je ressens quelque chose. Est-ce de l'amour ou de l'habitude ?",
    extra: "",
    answers: {
      nature: "Ex-conjoints, co-parentalite, relation post-separation",
      question: "Ce qui persiste dans le lien, est-ce l'attachement (Lune/Saturne) ou l'attraction (Venus/Mars) ? Qu'est-ce qui a fait tenir, et qu'est-ce qui a fait craquer ?",
      contexte: "50 ans, separee 6 mois, 3 enfants en commun, phase post-rupture"
    }
  }
];

const STORAGE_KEY = 'synastrie-module2';
const TOTAL_FIELDS = SITUATIONS.length * 3;

function buildSituationHTML(sit, i) {
  const quoteHTML = sit.quote
    ? `<span class="quote">\u00AB ${sit.quote} \u00BB</span>`
    : '';
  const extraHTML = sit.extra
    ? `<br><span style="color: var(--muted); font-size: 0.95em;">${sit.extra}</span>`
    : '';

  return `
  <div class="exercise-card" id="card-${sit.id}">
    <div class="card-number">Situation <span class="num">${i + 1}</span> / 3</div>
    <div class="situation-text">
      ${sit.text}${quoteHTML}${extraHTML}
    </div>

    <div class="field-group">
      <label for="nature-${sit.id}"><span class="dot dot-nature"></span> Nature du lien</label>
      <textarea
        id="nature-${sit.id}"
        placeholder="Quel type de relation ? Couple, ami, famille, collegue..."
        oninput="onInput()"
      ></textarea>
    </div>

    <div class="field-group">
      <label for="question-${sit.id}"><span class="dot dot-question"></span> Vraie question reformulee</label>
      <textarea
        id="question-${sit.id}"
        placeholder="Quelle est la question de synastrie exploitable ?"
        oninput="onInput()"
      ></textarea>
    </div>

    <div class="field-group">
      <label for="contexte-${sit.id}"><span class="dot dot-contexte"></span> Contexte indispensable</label>
      <textarea
        id="contexte-${sit.id}"
        placeholder="Age, duree, enfants, evenement declencheur..."
        oninput="onInput()"
      ></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-reveal" id="reveal-${sit.id}" onclick="toggleReveal(${sit.id})">
        Voir les reponses
      </button>
    </div>

    <div class="model-answer" id="model-${sit.id}">
      <div class="answer-divider"></div>
      <div class="answer-block answer-block-nature">
        <div class="answer-label label-nature"><span class="dot dot-nature"></span> Nature du lien</div>
        <div class="answer-text">${sit.answers.nature}</div>
      </div>
      <div class="answer-block answer-block-question">
        <div class="answer-label label-question"><span class="dot dot-question"></span> Vraie question reformulee</div>
        <div class="answer-text">${sit.answers.question}</div>
      </div>
      <div class="answer-block answer-block-contexte">
        <div class="answer-label label-contexte"><span class="dot dot-contexte"></span> Contexte indispensable</div>
        <div class="answer-text">${sit.answers.contexte}</div>
      </div>
    </div>
  </div>`;
}

function render() {
  const container = document.getElementById('exercises');
  const saved = loadSaved();

  container.innerHTML = SITUATIONS.map((sit, i) => buildSituationHTML(sit, i)).join('');

  SITUATIONS.forEach(sit => {
    ['nature', 'question', 'contexte'].forEach(field => {
      const key = `${field}-${sit.id}`;
      const el = document.getElementById(key);
      if (el && saved.answers[key]) el.value = saved.answers[key];
    });
  });

  if (saved.revealed) {
    saved.revealed.forEach(id => {
      const el = document.getElementById('model-' + id);
      const btn = document.getElementById('reveal-' + id);
      if (el) el.classList.add('visible');
      if (btn) { btn.textContent = 'Masquer les reponses'; btn.classList.add('revealed'); }
    });
  }

  updateProgress();
}

function onInput() {
  autoSave();
  updateProgress();
}

function toggleReveal(id) {
  const el = document.getElementById('model-' + id);
  const btn = document.getElementById('reveal-' + id);
  const isVisible = el.classList.contains('visible');

  if (isVisible) {
    el.classList.remove('visible');
    btn.textContent = 'Voir les reponses';
    btn.classList.remove('revealed');
  } else {
    el.classList.add('visible');
    btn.textContent = 'Masquer les reponses';
    btn.classList.add('revealed');
  }

  autoSave();
}

function updateProgress() {
  let count = 0;
  SITUATIONS.forEach(sit => {
    ['nature', 'question', 'contexte'].forEach(field => {
      const val = document.getElementById(`${field}-${sit.id}`)?.value?.trim();
      if (val && val.length > 3) count++;
    });
  });
  const pct = (count / TOTAL_FIELDS) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = count + ' / ' + TOTAL_FIELDS + ' champs remplis';
}

function getAnswers() {
  const answers = {};
  SITUATIONS.forEach(sit => {
    ['nature', 'question', 'contexte'].forEach(field => {
      const key = `${field}-${sit.id}`;
      answers[key] = document.getElementById(key)?.value || '';
    });
  });
  return answers;
}

function getRevealed() {
  const revealed = [];
  SITUATIONS.forEach(sit => {
    if (document.getElementById('model-' + sit.id)?.classList.contains('visible')) {
      revealed.push(sit.id);
    }
  });
  return revealed;
}

function autoSave() {
  const data = { answers: getAnswers(), revealed: getRevealed() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function saveAll() {
  autoSave();
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2000);
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { answers: {}, revealed: [] };
}

function clearAll() {
  if (!confirm('Effacer toutes vos reponses ?')) return;
  localStorage.removeItem(STORAGE_KEY);
  render();
}

render();
</script>
</body>
</html>
